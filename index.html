<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChessLens - Match Review</title>
  <!-- Google Fonts for Modern Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C10.8954 2 10 2.89543 10 4V6H7C6.44772 6 6 6.44772 6 7V9C6 10.1046 6.89543 11 8 11V15H16V11C17.1046 11 18 10.1046 18 9V7C18 6.44772 17.5523 6 17 6H14V4C14 2.89543 13.1046 2 12 2ZM9.5 16C8.67157 16 8 16.6716 8 17.5C8 18.3284 8.67157 19 9.5 19H14.5C15.3284 19 16 18.3284 16 17.5C16 16.6716 15.3284 16 14.5 16H9.5ZM7 20C6.44772 20 6 20.4477 6 21C6 21.5523 6.44772 22 7 22H17C17.5523 22 18 21.5523 18 21C18 20.4477 17.5523 20 17 20H7Z"
            fill="currentColor" />
        </svg>
        <h2>ChessLens</h2>
      </div>
      <nav class="nav-menu">
        <a href="#" class="nav-link" id="nav-dashboard">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"></rect>
            <rect x="14" y="3" width="7" height="7"></rect>
            <rect x="14" y="14" width="7" height="7"></rect>
            <rect x="3" y="14" width="7" height="7"></rect>
          </svg>
          Dashboard
        </a>
        <a href="#" class="nav-link active" id="nav-games">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="3" y1="9" x2="21" y2="9"></line>
            <line x1="9" y1="21" x2="9" y2="9"></line>
          </svg>
          Games
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="header">
        <h1 id="page-title">Chess history</h1>
        <div class="header-actions">
          <!-- Search user functionality -->
          <div class="search-box">
            <input type="text" id="username-input" placeholder="Chess.com Username" />
            <button id="fetch-btn" class="btn btn-primary">Fetch</button>
          </div>
        </div>
      </header>

      <!-- Views -->
      <div class="content-container">
        <!-- Games View -->
        <section id="view-games" class="view active">
          <div class="table-card">
            <div class="table-header">
              <div>
                <h3 id="table-summary">Showing 0 games</h3>
              </div>
              <div class="table-controls">
                <button class="btn btn-outline">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  Export PGN
                </button>
              </div>
            </div>

            <div class="table-responsive">
              <table class="games-table">
                <thead>
                  <tr>
                    <th style="width: 48px"></th>
                    <th>Date</th>
                    <th>Players</th>
                    <th>Time</th>
                    <th>Result</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="games-tbody">
                  <!-- Games will be injected here -->
                  <tr class="empty-state">
                    <td colspan="6">Enter a Chess.com username above to fetch games</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- Review View -->
        <section id="view-review" class="view hidden">
          <div class="review-layout">
            <div class="board-column">
              <div class="player-info top-player" id="black-info">
                <div class="player-avatar black"></div>
                <span class="player-name">Player Black</span>
                <span class="player-rating">(1200)</span>
              </div>

              <div class="board-with-eval">
                <div class="eval-bar-container" title="Evaluation Bar">
                  <div class="eval-fill" id="eval-fill" style="height: 50%;"></div>
                </div>
                <div id="chessground" class="cg-wrap"></div>
              </div>

              <div class="player-info bottom-player" id="white-info">
                <div class="player-avatar white"></div>
                <span class="player-name">Player White</span>
                <span class="player-rating">(1200)</span>
              </div>
            </div>

            <div class="sidebar-column">
              <div class="card analysis-card">
                <div class="card-header">
                  <h3>Engine Analysis</h3>
                  <div class="engine-status">
                    <span class="pulse-indicator"></span> Stockfish 16.1
                  </div>
                </div>

                <div class="eval-score" id="eval-score">+0.00</div>
                <div class="best-move" id="best-move">Depth: 0</div>
              </div>

              <div class="card moves-card">
                <div class="card-header">
                  <h3>Moves list</h3>
                </div>
                <div class="moves-list-container" id="moves-list">
                  <!-- Moves injected here -->
                </div>
                <div class="board-controls">
                  <button id="btn-start" class="btn btn-icon" title="Go to start"><svg viewBox="0 0 24 24" width="20"
                      height="20" stroke="currentColor" stroke-width="2" fill="none">
                      <polygon points="19 20 9 12 19 4 19 20"></polygon>
                      <line x1="5" y1="19" x2="5" y2="5"></line>
                    </svg></button>
                  <button id="btn-prev" class="btn btn-icon" title="Previous move"><svg viewBox="0 0 24 24" width="20"
                      height="20" stroke="currentColor" stroke-width="2" fill="none">
                      <polygon points="15 18 9 12 15 6 15 18"></polygon>
                    </svg></button>
                  <button id="btn-next" class="btn btn-icon" title="Next move"><svg viewBox="0 0 24 24" width="20"
                      height="20" stroke="currentColor" stroke-width="2" fill="none">
                      <polygon points="9 18 15 12 9 6 9 18"></polygon>
                    </svg></button>
                  <button id="btn-end" class="btn btn-icon" title="Go to end"><svg viewBox="0 0 24 24" width="20"
                      height="20" stroke="currentColor" stroke-width="2" fill="none">
                      <polygon points="5 4 15 12 5 20 5 4"></polygon>
                      <line x1="19" y1="5" x2="19" y2="19"></line>
                    </svg></button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
